# Pro Coolify: stačí ukázat na repozitář, zbytek si vezme odsud.
# Lokálně: docker compose up --build
services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      DB_PATH: /data/kdyhrajeme.db
      # Podle TZ se určuje "dnešek" předvyplněný v novém hlasování.
      # Bez něj je v kontejneru UTC a kolem půlnoci by to bylo o den vedle.
      TZ: Europe/Prague
    volumes:
      - kdyhrajeme-data:/data
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  kdyhrajeme-data:
