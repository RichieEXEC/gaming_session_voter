<!doctype html>
<html lang="{{ .L.Code }}">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ .Title }} · {{ .L.T "app.name" }}</title>
<meta name="description" content="{{ .L.T "app.tagline" }}">
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
<link rel="stylesheet" href="/static/app.css">
</head>
<body>
<div class="wrap">
  <header class="mast">
    <a class="brand" href="/">
      <svg class="mark" width="26" height="26" viewBox="0 0 26 26" aria-hidden="true">
        <rect x="1.5" y="1.5" width="23" height="23" rx="6" fill="none" stroke="currentColor" stroke-width="1.5"/>
        <circle cx="8" cy="8" r="2" fill="currentColor"/>
        <circle cx="18" cy="8" r="2" fill="currentColor"/>
        <circle cx="13" cy="13" r="2" fill="currentColor"/>
        <circle cx="8" cy="18" r="2" fill="currentColor"/>
        <circle cx="18" cy="18" r="2" fill="currentColor"/>
      </svg>
      <span class="wordmark">{{ .L.T "app.name" }}</span>
    </a>
    <div class="mast-spacer"></div>
    <a class="lang" href="/lang/{{ if eq .L.Code "cs" }}en{{ else }}cs{{ end }}">{{ .L.T "nav.langName" }}</a>
  </header>

  <main>
    {{ template "content" . }}
  </main>
</div>

{{ if .Flash }}<div class="toast on" id="toast" role="status">{{ .Flash }}</div>
{{ else }}<div class="toast" id="toast" role="status" aria-live="polite"></div>{{ end }}

<script src="/static/app.js" defer></script>
</body>
</html>
